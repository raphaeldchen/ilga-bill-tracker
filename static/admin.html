<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Illinois Legislative Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Source+Sans+3:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>

  <div id="toast" class="toast hidden"></div>

  <header class="masthead">
    <div class="masthead-rule"></div>
    <div class="masthead-top">
      <h1 class="masthead-title">
        Illinois Legislative Tracker
        <span class="admin-tag">Admin</span>
      </h1>
      <div class="masthead-controls">
        <span id="last-updated"></span>
        <button class="text-btn primary" id="fetch-btn" onclick="fetchUpdates()">Fetch Updates</button>
        <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
        <a href="/logout" class="text-btn">Log out</a>
      </div>
    </div>
    <div class="masthead-sub">
      <div class="masthead-meta">
        <span>104th General Assembly</span>
        <span class="sep">·</span>
        <span id="meta-date"></span>
        <span class="sep">·</span>
        <span id="meta-count">—</span>
      </div>
    </div>
  </header>

  <div class="app-body">

    <aside class="sidebar">
      <div class="sidebar-header">
        <p class="sidebar-label">Tracked Bills</p>
      </div>
      <button class="bill-all-btn active" id="all-bills-btn" onclick="setFilter('')">All Bills</button>
      <ul id="bill-list" class="bill-list"></ul>

      <div class="add-bill-section">
        <p class="sidebar-label">Add Bill</p>
        <div class="add-bill-row">
          <input
            id="add-bill-input"
            class="add-bill-input"
            type="text"
            placeholder="HB1288"
            onkeydown="if(event.key==='Enter') addBill()"
          />
          <button id="add-bill-btn" class="add-bill-btn" onclick="addBill()">Add</button>
        </div>
        <p id="add-error" class="add-error hidden"></p>
      </div>
    </aside>

    <main class="main-content">
      <div class="content-header">
        <span class="content-title" id="content-title">All Activity</span>
        <span class="content-count" id="action-count"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Bill</th>
              <th>Date</th>
              <th>Ch.</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="actions-tbody">
            <tr><td colspan="4" class="empty-state">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>

  </div>

  <script src="/static/admin.js"></script>
</body>
</html>
