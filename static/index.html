<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Illinois Legislative Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <div class="header-title">
        <strong>Illinois Legislative Tracker</strong>
      </div>
    </div>
  </header>

  <div id="toast" class="toast hidden"></div>

  <div class="app-body">

    <aside class="sidebar">
      <h6>Tracked Bills</h6>
      <ul id="bill-list" class="bill-list"></ul>
    </aside>

    <main class="main-content">
      <div class="table-toolbar">
        <span id="action-count" class="action-count"></span>
        <select id="bill-filter" onchange="applyFilter()">
          <option value="">All Bills</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Bill</th>
              <th>Date</th>
              <th>Chamber</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="actions-tbody">
            <tr><td colspan="4" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
